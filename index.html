<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Moto 3D</title>
<style>
body { margin:0; overflow:hidden; }
#hud {
  position: absolute;
  top: 10px;
  left: 10px;
  color: white;
  font-family: Arial;
  font-size: 20px;
}
</style>
</head>
<body>

<div id="hud">Moedas: 0</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>

<script>
let scene = new THREE.Scene();
let camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);

let renderer = new THREE.WebGLRenderer();
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// LUZ
let light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(10, 20, 10);
scene.add(light);

// CHÃO
let groundGeo = new THREE.PlaneGeometry(200, 200);
let groundMat = new THREE.MeshStandardMaterial({ color: 0x333333 });
let ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI/2;
scene.add(ground);

// MOTO (cubo)
let moto = new THREE.Mesh(
  new THREE.BoxGeometry(2,1,4),
  new THREE.MeshStandardMaterial({ color: 0xff0000 })
);
moto.position.y = 1;
scene.add(moto);

// MOEDAS
let coins = [];
let coinGeo = new THREE.SphereGeometry(0.5);
let coinMat = new THREE.MeshStandardMaterial({ color: 0xffff00 });

for(let i=0;i<20;i++){
  let coin = new THREE.Mesh(coinGeo, coinMat);
  coin.position.set(
    Math.random()*100-50,
    1,
    Math.random()*100-50
  );
  scene.add(coin);
  coins.push(coin);
}

// BOTS (carros)
let bots = [];
for(let i=0;i<5;i++){
  let bot = new THREE.Mesh(
    new THREE.BoxGeometry(2,1,4),
    new THREE.MeshStandardMaterial({ color: 0x00ff00 })
  );
  bot.position.set(Math.random()*50-25,1,Math.random()*50-25);
  scene.add(bot);
  bots.push(bot);
}

// CONTROLE
let keys = {};
document.addEventListener("keydown", e => keys[e.key]=true);
document.addEventListener("keyup", e => keys[e.key]=false);

let speed = 0;
let coinsCollected = 0;

// LOOP
function animate(){
  requestAnimationFrame(animate);

  // CONTROLES
  if(keys["w"]) speed = 0.3;
  else if(keys["s"]) speed = -0.2;
  else speed *= 0.95;

  if(keys["a"]) moto.rotation.y += 0.05;
  if(keys["d"]) moto.rotation.y -= 0.05;

  moto.translateZ(speed);

  // CÂMERA 3ª pessoa
  camera.position.x = moto.position.x + Math.sin(moto.rotation.y)*-10;
  camera.position.z = moto.position.z + Math.cos(moto.rotation.y)*-10;
  camera.position.y = 5;
  camera.lookAt(moto.position);

  // COLETAR MOEDAS
  coins.forEach((coin, index) => {
    if(coin.position.distanceTo(moto.position) < 2){
      scene.remove(coin);
      coins.splice(index,1);
      coinsCollected++;
      document.getElementById("hud").innerText = "Moedas: " + coinsCollected;
    }
  });

  // BOTS andando
  bots.forEach(bot=>{
    bot.position.x += Math.sin(Date.now()*0.001);
    bot.position.z += Math.cos(Date.now()*0.001);
  });

  renderer.render(scene, camera);
}

animate();
</script>

</body>
</html>
