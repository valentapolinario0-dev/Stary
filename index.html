<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Moto 3D PRO</title>

<!-- FORÇA MODO HORIZONTAL -->
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<style>
body {
  margin: 0;
  overflow: hidden;
  background: black;
}

/* HUD */
#hud {
  position: absolute;
  top: 10px;
  left: 10px;
  color: #00ffcc;
  font-family: Arial;
  font-size: 22px;
  text-shadow: 0 0 10px #00ffcc;
}

#speed {
  position: absolute;
  top: 40px;
  left: 10px;
  color: white;
}

/* BOTÕES MOBILE */
.controls {
  position: absolute;
  bottom: 20px;
  width: 100%;
  text-align: center;
}

button {
  width: 60px;
  height: 60px;
  margin: 10px;
  font-size: 20px;
  border-radius: 50%;
  border: none;
  background: rgba(255,255,255,0.3);
}
</style>
</head>

<body>

<div id="hud">Moedas: 0</div>
<div id="speed">Velocidade: 0</div>

<div class="controls">
  <button id="left">⬅️</button>
  <button id="up">⬆️</button>
  <button id="right">➡️</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>

<script>

// ================= TEXTURAS BASE64 =================

// CHÃO (fake textura)
let groundTexture = new THREE.TextureLoader().load(
"data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR4nGNgYAAAAAMAASsJTYQAAAAASUVORK5CYII="
);

// ================= CENA =================
let scene = new THREE.Scene();

let camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);

let renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// LUZ
let light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(10,20,10);
scene.add(light);

// CHÃO
let ground = new THREE.Mesh(
  new THREE.PlaneGeometry(300,300),
  new THREE.MeshStandardMaterial({ map: groundTexture, color:0x444444 })
);
ground.rotation.x = -Math.PI/2;
scene.add(ground);

// MOTO
let moto = new THREE.Mesh(
  new THREE.BoxGeometry(2,1,4),
  new THREE.MeshStandardMaterial({ color: 0xff0000 })
);
moto.position.y = 1;
scene.add(moto);

// MOEDAS
let coins = [];
for(let i=0;i<30;i++){
  let coin = new THREE.Mesh(
    new THREE.CylinderGeometry(0.5,0.5,0.2,16),
    new THREE.MeshStandardMaterial({ color: 0xffff00 })
  );
  coin.position.set(Math.random()*100-50,1,Math.random()*100-50);
  scene.add(coin);
  coins.push(coin);
}

// BOTS
let bots = [];
for(let i=0;i<8;i++){
  let bot = new THREE.Mesh(
    new THREE.BoxGeometry(2,1,4),
    new THREE.MeshStandardMaterial({ color: 0x00ff00 })
  );
  bot.position.set(Math.random()*50-25,1,Math.random()*50-25);
  scene.add(bot);
  bots.push(bot);
}

// ================= CONTROLES =================
let keys = {};
document.addEventListener("keydown", e => keys[e.key]=true);
document.addEventListener("keyup", e => keys[e.key]=false);

// MOBILE
document.getElementById("left").onclick = ()=> keys["a"]=true;
document.getElementById("right").onclick = ()=> keys["d"]=true;
document.getElementById("up").onclick = ()=> keys["w"]=true;

// ================= GAME =================
let speed = 0;
let coinsCollected = 0;

function animate(){
  requestAnimationFrame(animate);

  // MOVIMENTO
  if(keys["w"]) speed = 0.4;
  else speed *= 0.95;

  if(keys["a"]) moto.rotation.y += 0.05;
  if(keys["d"]) moto.rotation.y -= 0.05;

  moto.translateZ(speed);

  // CÂMERA ESTILO JOGO
  camera.position.x = moto.position.x + Math.sin(moto.rotation.y)*-8;
  camera.position.z = moto.position.z + Math.cos(moto.rotation.y)*-8;
  camera.position.y = 4;
  camera.lookAt(moto.position);

  // MOEDAS
  coins.forEach((coin, i)=>{
    coin.rotation.y += 0.1;
    if(coin.position.distanceTo(moto.position) < 2){
      scene.remove(coin);
      coins.splice(i,1);
      coinsCollected++;
      document.getElementById("hud").innerText = "Moedas: " + coinsCollected;
    }
  });

  // BOTS
  bots.forEach(bot=>{
    bot.position.x += Math.sin(Date.now()*0.001);
    bot.position.z += Math.cos(Date.now()*0.001);
  });

  // HUD SPEED
  document.getElementById("speed").innerText = "Velocidade: " + speed.toFixed(2);

  renderer.render(scene, camera);
}

animate();

</script>
</body>
</html>
