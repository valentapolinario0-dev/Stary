<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>GTA Moto Lite</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

<style>
body { margin:0; overflow:hidden; background:black; }

#hud {
  position:absolute;
  top:10px;
  left:10px;
  color:white;
  font-family:Arial;
  font-size:18px;
}
</style>
</head>

<body>

<div id="hud">
💰 0 <br>
❤️ 100
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>

<script>

// ================= TRAVAR TELA =================
async function lockLandscape(){
  try {
    await screen.orientation.lock("landscape");
  } catch(e){}
}
document.body.addEventListener("click", lockLandscape);

// ================= CENA =================
let scene = new THREE.Scene();

let camera = new THREE.PerspectiveCamera(
  75,
  window.innerWidth/window.innerHeight,
  0.1,
  1000
);

let renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// LUZ
let light = new THREE.DirectionalLight(0xffffff,1);
light.position.set(10,20,10);
scene.add(light);

// ================= MAPA =================

// chão
let ground = new THREE.Mesh(
  new THREE.PlaneGeometry(400,400),
  new THREE.MeshStandardMaterial({color:0x222222})
);
ground.rotation.x = -Math.PI/2;
scene.add(ground);

// prédios
for(let i=0;i<40;i++){
  let b = new THREE.Mesh(
    new THREE.BoxGeometry(5,Math.random()*20+5,5),
    new THREE.MeshStandardMaterial({color:0x777777})
  );
  b.position.set(
    Math.random()*200-100,
    b.geometry.parameters.height/2,
    Math.random()*200-100
  );
  scene.add(b);
}

// ================= PLAYER =================

let moto = new THREE.Mesh(
  new THREE.BoxGeometry(2,1,4),
  new THREE.MeshStandardMaterial({color:0xff0000})
);
moto.position.y = 1;
scene.add(moto);

// ================= MOEDAS =================
let coins = [];
for(let i=0;i<15;i++){
  let coin = new THREE.Mesh(
    new THREE.CylinderGeometry(0.5,0.5,0.2,16),
    new THREE.MeshStandardMaterial({color:0xffff00})
  );
  coin.position.set(Math.random()*100-50,1,Math.random()*100-50);
  scene.add(coin);
  coins.push(coin);
}

// ================= BOTS =================
let bots = [];
for(let i=0;i<8;i++){
  let bot = new THREE.Mesh(
    new THREE.BoxGeometry(2,1,4),
    new THREE.MeshStandardMaterial({color:0x00ff00})
  );
  bot.position.set(Math.random()*100-50,1,Math.random()*100-50);
  scene.add(bot);
  bots.push(bot);
}

// ================= CONTROLES =================
let keys = {};
document.addEventListener("keydown", e=>keys[e.key]=true);
document.addEventListener("keyup", e=>keys[e.key]=false);

// ================= SISTEMA =================
let speed = 0;
let money = 0;
let life = 100;

// ================= CÂMERA SUAVE =================
let cameraOffset = new THREE.Vector3(0, 5, -10);
let cameraTarget = new THREE.Vector3();

function updateCamera(){

  let offset = cameraOffset.clone();

  offset.applyAxisAngle(new THREE.Vector3(0,1,0), moto.rotation.y);

  let desiredPosition = moto.position.clone().add(offset);

  camera.position.lerp(desiredPosition, 0.1);

  cameraTarget.lerp(moto.position, 0.1);
  camera.lookAt(cameraTarget);
}

// ================= LOOP =================
function animate(){
requestAnimationFrame(animate);

// movimento
if(keys["w"]) speed = 0.5;
else speed *= 0.95;

if(keys["a"]) moto.rotation.y += 0.05;
if(keys["d"]) moto.rotation.y -= 0.05;

moto.translateZ(speed);

// câmera
updateCamera();

// moedas
coins.forEach((coin,i)=>{
coin.rotation.y += 0.1;

if(coin.position.distanceTo(moto.position)<2){
scene.remove(coin);
coins.splice(i,1);
money++;
}
});

// bots dano
bots.forEach(bot=>{
bot.position.x += Math.sin(Date.now()*0.001);

if(bot.position.distanceTo(moto.position)<2){
life -= 0.3;
}
});

// morte
if(life <= 0){
alert("Você morreu!");
location.reload();
}

// HUD
document.getElementById("hud").innerHTML =
"💰 "+money+"<br>❤️ "+Math.floor(life);

renderer.render(scene,camera);
}

animate();

// ================= RESIZE =================
window.addEventListener("resize", ()=>{
camera.aspect = window.innerWidth/window.innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(window.innerWidth, window.innerHeight);
});

</script>

</body>
</html>
