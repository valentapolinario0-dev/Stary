<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>GTA RP PRO</title>

<style>
body{margin:0;overflow:hidden;background:black;}
</style>
</head>

<body>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/examples/js/loaders/GLTFLoader.js"></script>

<script>

// ================= CENA =================
let scene = new THREE.Scene();

let camera = new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,1000);

let renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);

// LUZ
let light = new THREE.DirectionalLight(0xffffff,1);
light.position.set(10,20,10);
scene.add(light);

// CHÃO
let ground = new THREE.Mesh(
  new THREE.PlaneGeometry(200,200),
  new THREE.MeshStandardMaterial({color:0x222222})
);
ground.rotation.x = -Math.PI/2;
scene.add(ground);

// ================= PLAYER =================
let player, mixer;
let actions = {};
let currentAction;

let loader = new THREE.GLTFLoader();

loader.load("player.glb", (gltf)=>{

  player = gltf.scene;
  player.scale.set(1,1,1);
  player.position.y = 0;
  scene.add(player);

  mixer = new THREE.AnimationMixer(player);

  gltf.animations.forEach(anim=>{
    actions[anim.name] = mixer.clipAction(anim);
  });

  currentAction = actions["Idle"] || Object.values(actions)[0];
  currentAction.play();

});

// ================= CONTROLES =================
let keys={};
document.addEventListener("keydown",e=>keys[e.key]=true);
document.addEventListener("keyup",e=>keys[e.key]=false);

// ================= TROCAR ANIMAÇÃO =================
function switchAnimation(name){

  if(!actions[name]) return;

  if(currentAction === actions[name]) return;

  currentAction.fadeOut(0.2);

  currentAction = actions[name];
  currentAction.reset().fadeIn(0.2).play();
}

// ================= MOVIMENTO =================
function updatePlayer(){

  if(!player) return;

  let moving=false;

  if(keys["w"]){
    player.position.z -= 0.1;
    player.rotation.y = 0;
    moving=true;
  }

  if(keys["s"]){
    player.position.z += 0.1;
    player.rotation.y = Math.PI;
    moving=true;
  }

  if(keys["a"]){
    player.position.x -= 0.1;
    player.rotation.y = Math.PI/2;
    moving=true;
  }

  if(keys["d"]){
    player.position.x += 0.1;
    player.rotation.y = -Math.PI/2;
    moving=true;
  }

  if(moving){
    switchAnimation("Walk");
  }else{
    switchAnimation("Idle");
  }
}

// ================= ARMA =================
let bullets=[];

document.addEventListener("click", ()=>{

  if(!player) return;

  let bullet = new THREE.Mesh(
    new THREE.SphereGeometry(0.2),
    new THREE.MeshBasicMaterial({color:0xffff00})
  );

  bullet.position.copy(player.position);

  bullet.dir = new THREE.Vector3(0,0,-1);
  bullet.dir.applyAxisAngle(new THREE.Vector3(0,1,0), player.rotation.y);

  scene.add(bullet);
  bullets.push(bullet);

});

// ================= CÂMERA SUAVE =================
function updateCamera(){

  if(!player) return;

  let offset = new THREE.Vector3(0,5,10);
  offset.applyAxisAngle(new THREE.Vector3(0,1,0), player.rotation.y);

  let targetPos = player.position.clone().add(offset);

  camera.position.lerp(targetPos,0.1);
  camera.lookAt(player.position);
}

// ================= LOOP =================
let clock = new THREE.Clock();

function animate(){
requestAnimationFrame(animate);

let delta = clock.getDelta();

if(mixer) mixer.update(delta);

updatePlayer();
updateCamera();

// mover tiros
bullets.forEach(b=>{
  b.position.add(b.dir.clone().multiplyScalar(0.5));
});

renderer.render(scene,camera);
}

animate();

// ================= RESIZE =================
window.addEventListener("resize", ()=>{
camera.aspect = innerWidth/innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(innerWidth,innerHeight);
});

</script>

</body>
</html>
